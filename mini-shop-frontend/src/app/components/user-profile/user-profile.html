<div class="profile-container">
  <mat-card class="profile-card">
    <mat-card-header>
      <mat-card-title>My Profile</mat-card-title>
      <button mat-icon-button (click)="toggleEdit()">
        <mat-icon>{{ isEditMode() ? 'close' : 'edit' }}</mat-icon>
      </button>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="profileForm" (ngSubmit)="onUpdate()">
        
        <!-- Name Field -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Full Name</mat-label>
          <input matInput formControlName="username" [readonly]="!isEditMode()">
        </mat-form-field>

        <!-- Email Field -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email Address</mat-label>
          <input matInput formControlName="email" [readonly]="!isEditMode()">
        </mat-form-field>

        <!-- Phone Field -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Phone Number</mat-label>
          <input matInput formControlName="phoneNumber" [readonly]="!isEditMode()">
        </mat-form-field>

        <!-- Address Field -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Address</mat-label>
          <textarea matInput formControlName="address" [readonly]="!isEditMode()"></textarea>
        </mat-form-field>

        <!-- New Password (Only in Edit Mode) -->
        <mat-form-field appearance="outline" class="full-width" *ngIf="isEditMode()">
          <mat-label>New Password (Leave blank to keep current)</mat-label>
          <input matInput type="password" formControlName="newPassword">
        </mat-form-field>

        <div class="actions" *ngIf="isEditMode()">
          <button mat-raised-button color="primary" type="submit" [disabled]="profileForm.invalid">
            Save Changes
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
